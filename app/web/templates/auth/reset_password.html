{% extends "base.html" %}

{% block content %}
<section class="hero-card container py-5">
  <div class="row justify-content-center">
    <div class="col-12 col-lg-8">
      <div class="auth-card">
        <p class="eyebrow mb-2">Password reset</p>
        <h1 class="display-4 fw-semibold mb-3">{{ heading }}</h1>
        <p class="lead mb-4">{{ message }}</p>

        <form id="reset-form" method="post" action="{{ post_url }}">
          <input type="hidden" name="token" id="reset-token" value="{{ token | default('') }}">
          <div class="mb-3">
            <label class="form-label" for="new_password">New password</label>
            <input
              class="form-control"
              id="new_password"
              name="new_password"
              type="password"
              autocomplete="new-password"
              required
            >
          </div>
          <div class="d-flex flex-wrap gap-3 align-items-center">
            <button class="btn btn-primary" type="submit">Update password</button>
            <a class="btn btn-outline-secondary" href="{{ home_url }}">Go home</a>
            <span class="status-pill status-pill--{{ state }}">{{ state }}</span>
          </div>
        </form>

        <p class="auth-meta mt-4" id="reset-hint">
          Open the password-reset email link and the token will be loaded automatically.
        </p>

        <noscript>
          <p class="auth-meta mt-3">
            JavaScript is required to load the reset token from the email link.
          </p>
        </noscript>
      </div>
    </div>
  </div>
</section>

<script>
  (() => {
    const fragment = new URLSearchParams(window.location.hash.slice(1));
    const token = fragment.get("token");
    const tokenInput = document.getElementById("reset-token");
    const hint = document.getElementById("reset-hint");
    if (!token || !tokenInput) {
      if (hint) {
        hint.textContent = "Open the link from your email so the reset token can be loaded.";
      }
      return;
    }
    tokenInput.value = token;
    window.history.replaceState({}, document.title, window.location.pathname + window.location.search);
  })();
</script>
{% endblock %}
